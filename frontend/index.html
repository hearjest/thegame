<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>thegame</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>


<div id="roomSelection">
  <h2>Rooms</h2>
  <div id="roomMasterContainer">
  <div id="roomSelectionContainer">
    <div>To play, please create or join a room!</div>
     <label><input type="radio" name="visibility" value="public" checked> Public</label>
  <label><input type="radio" name="visibility" value="private"> Private</label>
  <select id="capacity">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>
  <button type="button" onclick="createRoom()">Create Room</button>
  </div>
    <div id="roomListMasterCOntainer">
      Current open room(s)
  <button type="button" onclick="refreshRoomList()">Refresh list</button>
  <div id="roomListContainer">
    <div id="roomList"></div>
  </div>
</div>
</div>

  </div>
</div>


<div id="lobbyScreen" style="display:none">
  <h2 id="lobbyRoomId">Room</h2>
  <div style="display:flex; gap:40px;">
    <div>
      <h3>Players in room</h3>
      <div id="lobbyMembers"></div>
    </div>
    <div>
      <h3>Choose your party (pick 2)</h3>
      <div class="roster" id="roster"><div class="sub">connecting…</div></div>
      <button type="button" id="confirmBtn" onclick="confirmSelection()" disabled>Confirm (0/2)</button>

    </div>
  </div>
</div>

  <div id="combatScreen">
    <div id="endOverlay" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center;">
  <div style="background:#1c2330; border:2px solid #3a4456; border-radius:10px; padding:32px 48px; text-align:center;">
    <div id="endText" style="font-size:32px; font-weight:bold; margin-bottom:20px;"></div>
    <button onclick="backToRooms()" style="padding:14px 28px; font-family:monospace; font-size:16px; background:#40485d; color:white; border:2px solid white; border-radius:8px; cursor:pointer;">Back to Rooms</button>
  </div>
</div>
    <div class="navbar">
      <div class="nav-hp">
        <span class="heart">&#10084;</span>
        <span id="navHpText">--/--</span>
        <div class="bar"><div class="fill" id="navHpFill"></div></div>
      </div>
      <div id="items">

      </div>
      <div class="nav-meta" id="navMeta">connecting…</div>
    </div>

    <div class="battlefield">
      <div class="side party-side">
        <div class="field-label">Your party</div>
        <div class="player-row" id="players"></div>
     </div>
      <div class="side enemy-side">
         <div class="field-label">Enemies</div>
        <div class="enemy-row" id="enemies"></div>
      </div>
    </div>

    <div class="ap"><span id="apText">0/0</span></div>

    <div class="hand" id="hand"></div>

    <button type="button" class="endturn" onclick="endTurn()">End Turn</button>

    <button type="button" class="begin" id="beginBtn" onclick="begin()">Begin</button>

    <div id="log"></div>
    <div id="gameLog"></div>
  </div>

<script src="index.js?v=24"></script>
</body>
</html>
