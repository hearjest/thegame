<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>thegame</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="navbar">
    <div class="nav-hp">
      <span class="heart">&#10084;</span>
      <span id="navHpText">--/--</span>
      <div class="bar"><div class="fill" id="navHpFill" style="width:100%"></div></div>
    </div>
    <div class="nav-meta" id="navMeta">connecting…</div>
  </div>

  <div class="battlefield">
    <div class="field-label">Enemies</div>
    <div class="enemy-row" id="enemies"></div>
    <div class="field-label">Your party</div>
    <div class="player-row" id="players"></div>
  </div>

  <div class="ap"><span id="apText">0/0</span></div>

  <div class="hand" id="hand"></div>

  <button class="endturn" onclick="endTurn()">End Turn</button>

  <button class="begin" id="beginBtn" onclick="begin()">Begin</button>

  <div id="log"></div>

<script src="index.js"></script>
</body>
</html>
